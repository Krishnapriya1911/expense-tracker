<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Health Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 bg-dark text-white vh-100 p-3">

<h3 class="text-center">Mini DevOps</h3>

<hr>

<ul class="nav flex-column">

<li class="nav-item mb-3">
<a href="dashboard.html" class="nav-link text-white">🏠 Dashboard</a>
</li>

<li class="nav-item mb-3">
<a href="builds.html" class="nav-link text-white">🔨 Builds</a>
</li>

<li class="nav-item mb-3">
<a href="deployments.html" class="nav-link text-white">🚀 Deployments</a>
</li>

<li class="nav-item mb-3">
<a href="health.html" class="nav-link text-warning">❤️ Health</a>
</li>

<li class="nav-item">
<a href="login.html" class="nav-link text-danger">🚪 Logout</a>
</li>

</ul>

</div>

<div class="col-md-10 p-4">

<h2>System Health</h2>

<div class="card shadow p-4 mt-4">

<h4>Backend Status</h4>

<p>
<span id="backendStatus" class="badge bg-secondary">
Checking...
</span>
</p>

<h4 class="mt-4">Application</h4>

<p id="applicationName">
Loading...
</p>

<h4 class="mt-4">Message</h4>

<p id="backendMessage">
Loading...
</p>

<hr>

<h4>Database</h4>

<p>
<span class="badge bg-success">
CONNECTED
</span>
</p>

<h4 class="mt-4">Docker</h4>

<p>
<span class="badge bg-success">
ACTIVE
</span>
</p>

<h4 class="mt-4">Jenkins</h4>

<p>
<span class="badge bg-success">
ONLINE
</span>
</p>

</div>

</div>

</div>

</div>

<script>

const API_URL = "http://localhost:8081";

async function loadHealth(){

    try{

        const response = await fetch(API_URL + "/api/health");

        const data = await response.json();

        const badge =
            document.getElementById("backendStatus");

        badge.innerText = data.status;

        if(data.status === "UP"){

            badge.className =
                "badge bg-success";

        }else{

            badge.className =
                "badge bg-danger";

        }

        document.getElementById("applicationName")
            .innerText = data.application;

        document.getElementById("backendMessage")
            .innerText = data.message;

    }

    catch(error){

        document.getElementById("backendStatus")
            .innerText = "DOWN";

        document.getElementById("backendStatus")
            .className = "badge bg-danger";

        document.getElementById("applicationName")
            .innerText = "Backend Unreachable";

        document.getElementById("backendMessage")
            .innerText = error.message;

    }

}

loadHealth();

</script>

</body>

</html>
