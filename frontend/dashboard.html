<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mini DevOps Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 bg-dark text-white vh-100 p-3">

<h3 class="text-center">Mini DevOps</h3>

<hr>

<ul class="nav flex-column">

<li class="nav-item mb-3">
<a href="dashboard.html" class="nav-link text-warning">
🏠 Dashboard
</a>
</li>

<li class="nav-item mb-3">
<a href="builds.html" class="nav-link text-white">
🔨 Builds
</a>
</li>

<li class="nav-item mb-3">
<a href="deployments.html" class="nav-link text-white">
🚀 Deployments
</a>
</li>

<li class="nav-item mb-3">
<a href="health.html" class="nav-link text-white">
❤️ Health
</a>
</li>

<li class="nav-item">
<a href="login.html" class="nav-link text-danger">
🚪 Logout
</a>
</li>

</ul>

</div>

<div class="col-md-10 p-4">

<h2>Dashboard</h2>

<p class="text-muted">
Welcome,
<strong id="loggedUser">User</strong>
</p>

<div class="row mt-4">

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Total Builds</h5>

<h2 id="totalBuilds">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Successful Builds</h5>

<h2 id="successfulBuilds">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Failed Builds</h5>

<h2 id="failedBuilds">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Latest Deployment</h5>

<h5 id="latestDeployment">--</h5>

</div>

</div>

</div>

</div>

<div class="mt-5">

<button
id="triggerBuild"
class="btn btn-primary">

Trigger New Build

</button>

</div>

</div>

</div>

</div>

<script src="js/app.js"></script>

</body>

</html>
