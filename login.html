<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpendWise — Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="brand-mark">S</div>
        <h1>SpendWise</h1>
        <p class="subtitle">DevOps Automation Platform</p>

        <div id="loginError" class="alert error"></div>

        <form onsubmit="loginUser(event)">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required minlength="3" maxlength="20">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required minlength="6">
            </div>

            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>

        <p class="hint">No account yet? The backend has no signup endpoint &mdash;
            insert a row into the <code>users</code> table directly (see README).</p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
